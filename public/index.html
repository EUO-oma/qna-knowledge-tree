<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QnA Knowledge Tree</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="layout">
    <section class="left panel">
      <header class="panel-header">
        <h1>Knowledge Tree</h1>
        <input id="tagSearchInput" placeholder="태그 검색" />
        <button id="addRootBtn">루트 질문 추가</button>
      </header>
      <div id="treeContainer"></div>
    </section>

    <section class="right panel">
      <header class="panel-header"><h2>노드 상세</h2></header>
      <div id="detailPanel">노드를 선택하세요.</div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
