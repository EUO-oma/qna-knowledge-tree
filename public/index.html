<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QnA Knowledge Tree</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="mobile-tabs" id="mobileTabs">
    <button id="mobileTreeTab" class="active">트리</button>
    <button id="mobileDetailTab">상세</button>
  </div>
  <main class="layout">
    <section class="left panel" id="leftPanel">
      <header class="panel-header wrap">
        <h1>Knowledge Tree</h1>
        <input id="tagSearchInput" placeholder="태그 검색" />
        <span id="resultCount" class="muted">결과 0개</span>
        <div class="type-filters" id="typeFilters">
          <button class="type-chip active" data-type="all">전체</button>
          <button class="type-chip" data-type="question">Q</button>
          <button class="type-chip" data-type="answer">A</button>
          <button class="type-chip" data-type="law">Law</button>
          <button class="type-chip" data-type="link">Link</button>
        </div>
        <button id="collapseAllBtn">전체 접기</button>
        <button id="expandAllBtn">전체 펼치기</button>
        <button id="addRootBtn">루트 노드 추가</button>
        <button id="authBtn">Google 로그인</button>
        <span id="authState" class="muted">비로그인</span>
      </header>
      <p id="toast" class="toast" hidden></p>
      <section class="composer" id="composer" hidden>
        <h3>노드 작성</h3>
        <input id="nodeTitleInput" placeholder="제목" />
        <select id="nodeTypeSelect">
          <option value="question">question</option>
          <option value="answer">answer</option>
          <option value="law">law</option>
          <option value="link">link</option>
        </select>
        <textarea id="nodeContentInput" rows="3" placeholder="내용 (선택)"></textarea>
        <input id="nodeTagsInput" placeholder="태그 (콤마 구분)" />
        <p class="muted" id="composerTarget">대상: 루트</p>
        <div class="composer-actions">
          <button id="composerSaveBtn">저장</button>
          <button id="composerCancelBtn">취소</button>
        </div>
      </section>
      <div id="treeContainer"></div>
    </section>

    <section class="right panel" id="rightPanel">
      <header class="panel-header"><h2>노드 상세</h2></header>
      <div id="detailPanel">노드를 선택하세요.</div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
